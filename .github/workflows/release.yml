name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Releases are gated on the test suite: nothing builds or publishes if
  # tests or lints fail on the tagged commit.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cargo test --locked
      - name: Clippy
        if: matrix.os == 'ubuntu-22.04'
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04 # oldest LTS runner → widest glibc compatibility
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14 # cross-compiled; Intel runners are being retired
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf herdr-clip-${{ matrix.target }}.tar.gz herdr-clip
      - uses: actions/upload-artifact@v4
        with:
          name: herdr-clip-${{ matrix.target }}
          path: herdr-clip-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Checksums
        run: sha256sum herdr-clip-*.tar.gz > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "herdr-clip $GITHUB_REF_NAME" \
            --generate-notes \
            herdr-clip-*.tar.gz SHA256SUMS
